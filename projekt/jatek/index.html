<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igaz vagy Hamis Játék</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            text-align: center;
        }
        #game, #results {
            display: none;
        }
        button {
            margin: 5px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #feedback {
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
        }
        table {
            margin: 0 auto;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid black;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>Igaz vagy Hamis Játék</h1>
    <div id="start-screen">
        <button id="start-game">Játsszunk!</button>
    </div>
    <div id="game">
        <p id="question"></p>
        <p id="feedback"></p>
        <button id="true-button">Igaz</button>
        <button id="false-button">Hamis</button>
        <button id="next-question">Következő</button>
        <button id="end-game">Eredmények</button>
    </div>
    <div id="results">
        <h2>Eredmények</h2>
        <table id="summary-table">
            <thead>
                <tr>
                    <th>Kérdés</th>
                    <th>Válasz</th>
                    <th>Helyes válasz</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <p id="summary"></p>
        <button id="restart-game">Újra!</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
